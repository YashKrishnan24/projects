<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Submission</title>

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.25);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.65);
      --accent: #7c7cff;
      --success: #2ecc71;
      --error: #ff6b6b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: var(--text);
    }

    .glass-card {
      width: 100%;
      max-width: 380px;
      padding: 2.2rem 1.8rem;
      border-radius: 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
      animation: fadeUp 0.7s ease;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.4rem;
      letter-spacing: 0.3px;
    }

    p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.4rem;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid transparent;
      border-radius: 12px;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      transition: 0.3s ease;
    }

    input::placeholder {
      color: transparent;
    }

    label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      color: var(--muted);
      pointer-events: none;
      transition: 0.3s ease;
      padding: 0 6px;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.12);
    }

    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 0.7rem;
      color: var(--accent);
    }

    .error {
      font-size: 0.75rem;
      color: var(--error);
      margin-top: 0.4rem;
      display: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #9f9fff);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.3s ease;
      box-shadow: 0 10px 30px rgba(124, 124, 255, 0.45);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .success {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: var(--success);
      opacity: 0;
      transform: translateY(10px);
      transition: 0.4s ease;
    }

    .success.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="glass-card">
    <h1>Join the waitlist</h1>
    <p>We’ll only email you when it matters.</p>

    <form id="emailForm" novalidate>
      <div class="input-group">
        <input type="email" id="email" placeholder="Email" />
        <label for="email">Email address</label>
        <div class="error" id="errorMsg">Please enter a valid email address</div>
      </div>

      <button type="submit">
        <span id="btnText">Submit</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <div class="success" id="successMsg">
      ✔ Successfully subscribed
    </div>
  </div>

  <script>
    const form = document.getElementById("emailForm");
    const emailInput = document.getElementById("email");
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");
    const button = form.querySelector("button");

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();

      if (!emailRegex.test(email)) {
        errorMsg.style.display = "block";
        return;
      }

      errorMsg.style.display = "none";
      button.disabled = true;
      spinner.style.display = "block";
      btnText.textContent = "Submitting";

      // Simulated API request
      setTimeout(() => {
        spinner.style.display = "none";
        btnText.textContent = "Submit";
        button.disabled = false;
        successMsg.classList.add("show");
        form.reset();

        setTimeout(() => {
          successMsg.classList.remove("show");
        }, 3000);
      }, 1800);
    });
  </script>
</body>
</html>
